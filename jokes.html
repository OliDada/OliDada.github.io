<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oli.is - Jokes</title>
    <link rel="icon" href="images/dolphin2.png" type="image/x-icon">
    <link href="style.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <script src="draw.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body class="arcade">
    <canvas id="three-canvas" class="three-canvas" aria-hidden="true"></canvas>

    <header class="site-header">
      <div class="brand">
        <a href="/" class="brand-link" aria-label="Home">
          <img src="images/dolphin1.png" alt="logo" class="logo">
        </a>
        <div>
          <a href="/" class="brand-link"><h1 class="site-title">Oli.is</h1></a>
          <p class="site-tag">Games and stuff</p>
        </div>
      </div>
      <div class="center-controls">
        <a class="btn home-btn" href="/">Home</a>
        <a id="programsBtn" class="btn" href="programs.html">Programs</a>
        <a id="jokesBtn" class="btn" href="jokes.html">Jokes</a>
      </div>
      <nav class="top-nav">
        <div class="bg-controls">
            <div class="bg-label"><p>Change background color</p></div>
            <div class="bg-buttons">
              <div class="color-picker-wrap" data-tooltip="Pick a background color">
                <input type="color" id="pageColorPicker" value="#ffa500" aria-label="Page color picker" title="Pick background color">
                <span id="pageColorDisplay" class="color-display" aria-hidden="true"></span>
              </div>
              <button id="randomBgBtn" class="btn small" data-tooltip="Set a random background color">Random</button>
              <button id="revertBgBtn" class="btn small" data-tooltip="Revert to the default background image">Revert</button>
              <button id="toggle-3d" class="btn small">3D</button>
            </div>
          </div>
      </nav>
    </header>

    <div class="arcade-layout">
      <main class="arcade-main">
        <section id="hero" class="hero">
          <h2 class="hero-title">Jokes</h2>
          <p class="sub_title">Click the button to see a joke!</p>
        </section>

        <section class="section text-container">
          <div>
            <div class="joke-controls">
              <button id="showJokeBtn" class="btn">Show me a joke</button>
            </div>
            <p id="jokeDisplay" class="joke-display" aria-live="polite"></p>
            <div id="allJokesContainer" class="all-jokes" hidden aria-live="polite"></div>
            <div class="bottom-actions" style="margin-top:18px;">
              <button id="showAllJokesBtn" class="btn">Show all jokes</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <footer class="site-footer"><p></p></footer>

    <script>
      // lightweight jokes list and wiring (kept inline for a small page)
      (function(){
        const jokes = [
          "Afhverju var kötturinn svona fyndinn?\n - Hann var brandóttur",
          "Hvað kallar maður hund í fýlu?\n - Hundasúra",
          "Heyrðir þú um manninn sem sofnaði undir stýri en klessti ekkert á?\n - Hann var með stýru",
          "Afhverju var kallinn hræddur við að fara í skóna sína?\n - Þeir voru reimdir",
          "Maður labbar inn á bar og segir: “Gæti ég fengið eitt skot?\n - *BANG*",
          "Hver er uppáhalds jólasveinn óléttra kvenna?\n - Bjúgnakrækir",
          "Hvað er músíkalskasta grænmetið?\n - Laukurinn, hann hefur svo mörg lög",
          "Afhverju var gúrkan alltaf óskipulögð?\n - Hún var b-gúrka",
          "Hvaða grænmeti er besti rithöfundurinn?\n - Blaðlaukur",
          "Afhverju fór kartaflan í strípur?\n - Hún vildi ekki vera rótargrænmeti",
          "Hvað er bleikt, hvítt og kann að fljúga?\n - Ormur með vængi",
          "Hvaða dýr eru best í fótbolta?\n - Skordýr",
          "Hvað kallar maður veika hænu?\n - Sjúkling",
          "Hvað sagði köngulóin við hina köngulóna?\n - “Hvað er netfangið þitt?”",
          "Hefur þú séð seðlabanka?\n - Ha? Hefur þú séð seðla banka? En þeir eru ekki með hendur!",
          "Hefur þú séð stöðumælasekt?\n - Ha? Hefur þú séð stöðu mæla sekt? Með málbandi eða?",
          "Hefur þú séð stjörnuspá?\n - Er það? Hvað var hún eiginlega að spá?",
          "Hvað kallast það þegar að hjón fá gubbupest í brúðkaupsferðinni sinni?\n - Hjónabandsæla",
          "Hvaða íþrótt er best að spila ef maður er rangeygður?\n - Skák",
          "Hvað sagði maðurinn þegar hann var að keyra á Hellisheiðinni og sá kúk í vegkantinum?\n - “Hver-a-gerði þetta?”",
          "Afhverju var litli ljóti andarunginn skilinn útundan?\n - Hann var andfúll",
          "Hvað sagði blaðran við hina blöðruna?\n - “Verðum í bandi!”",
          "Ég er háður því að aflýsa hlutum. \n - Ég get samt hætt hvenær sem er",
          "Maður fer til læknis og segir: “Hjálp, ég get ekki hætt að hugsa um holur!”.\nLæknirinn skoðar hann og segir svo: “Það er ekki furða á því, þú ert með göt á heilanum”.",
          "Maður labbar inn á bóndabæ og sér bónda út á túni að tala við svín.\n Maðurinn spyr: “Afhverju ertu að tala við svínið? Skilur það íslensku?”.\n Bóndinn svarar: “Nei, hann er grískur”.",
          "Maður situr á veitingastað og spyr þjóninn: “Hvaða réttur er vinsælastur hjá ykkur, svona yfir höfuð?”\n Þjóninn klórar sér í hausnum: “Ég bara veit það ekki… ætli að það sé ekki súpan.”\n Maðurinn kinkar kolli: “Ok, hljómar vel.”\n Skömmu seinna birtist þjóninn með súpuna og sturtar henni beint yfir hausinn á manninum.",
          "Hvað sagði krakkinn eftir að hafa lært allt stafrófið?\n - “Hausinn minn er bókstaflega að springa!”",
          "Afhverju eru Eskimóar alltaf á stefnumótum?\n - Þeir kunna að brjóta ísinn",
          "Hvers vegna var Stebbi svona góður læknir?\n - Hann var með puttana á púlsinum",
          "Afhverju eru kafarar svona klárir?\n - Þeir eru alltaf að leggja höfuðið í bleyti",
          "Afhverju er garðurinn hans Shrek alltaf svona fínn?\n - Hann er með græna fingur",""
        ];

        function showJoke() {
          const randomIndex = Math.floor(Math.random() * jokes.length);
          document.getElementById('jokeDisplay').innerText = jokes[randomIndex];
        }

        document.getElementById('showJokeBtn').addEventListener('click', showJoke);

        // show all jokes toggle
        function toggleAllJokes() {
          const container = document.getElementById('allJokesContainer');
          const btn = document.getElementById('showAllJokesBtn');
          if (!container) return;
          if (container.hasAttribute('hidden')) {
            // populate
            container.innerHTML = jokes.map((j, i) =>
              `<div class="joke-item"><strong>${i+1}.</strong> <span>${j.replace(/\n/g, '<br>')}</span></div>`
            ).join('');
            container.removeAttribute('hidden');
            btn.textContent = 'Hide all jokes';
          } else {
            container.setAttribute('hidden', '');
            btn.textContent = 'Show all jokes';
          }
        }

        const allBtn = document.getElementById('showAllJokesBtn');
        if (allBtn) allBtn.addEventListener('click', toggleAllJokes);

        // show a random joke immediately when the page loads
        try { showJoke(); } catch (e) { /* ignore if DOM not ready */ }
      })();
    </script>
  </body>
</html>
